<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Helvaci Ali Mosul | Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#2B1915;
color:white;
}

.header{
padding:35px 20px;
text-align:center;
}

.header h1{
font-size:34px;
margin-bottom:10px;
color:#F5EBDD;
}

.header p{
color:#D8C7B7;
font-size:16px;
}

.gallery{
max-width:900px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:1fr;
gap:25px;
}

.gallery img{
width:100%;
border-radius:20px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.35);
transition:.25s;
}

.gallery img:hover{
transform:scale(1.02);
}

.viewer{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.viewer img{
max-width:100%;
max-height:100%;
border-radius:15px;
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:42px;
cursor:pointer;
color:white;
}

.footer{
text-align:center;
padding:35px;
color:#CDB9A8;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">

<h1>Menu</h1>

<p>Helvaci Ali Mosul</p>

</div>

<div class="gallery">

<img src="helvaciali.mosul_20260713_170724_401.jpg" onclick="openImage(this.src)">

<img src="helvaciali.mosul_20260713_170727_802.jpg" onclick="openImage(this.src)">

<img src="helvaciali.mosul_20260713_170731_340.jpg" onclick="openImage(this.src)">

<img src="helvaciali.mosul_20260713_170737_476.jpg" onclick="openImage(this.src)">

<img src="helvaciali.mosul_20260713_170741_607.jpg" onclick="openImage(this.src)">

<img src="helvaciali.mosul_20260713_170744_003.jpg" onclick="openImage(this.src)">

<img src="helvaciali.mosul_20260713_170746_034.jpg" onclick="openImage(this.src)">

<img src="helvaciali.mosul_20260713_170747_675.jpg" onclick="openImage(this.src)">

<img src="helvaciali.mosul_20260713_170749_742.jpg" onclick="openImage(this.src)">

<img src="helvaciali.mosul_20260713_170753_150.jpg" onclick="openImage(this.src)">

</div>

<div class="viewer" id="viewer" onclick="closeImage()">

<span class="close">&times;</span>

<img id="big">

</div>

<div class="footer">

© Helvaci Ali Mosul

</div>

<script>

function openImage(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("big").src=src;
}

function closeImage(){
document.getElementById("viewer").style.display="none";
}

</script>

</body>

</html>
